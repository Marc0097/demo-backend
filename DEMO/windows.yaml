agent:
  system_template: |
    You are a helpful assistant that can interact with a Windows computer.
  instance_template: |
    Please solve this issue: {{task}}

    You can execute cmd/powershell commands and edit files to implement the necessary changes.

    ## Recommended Workflow

    1. Analyze the codebase by finding and reading relevant files
    2. Edit the source code to resolve the issue
    3. Submit your changes and finish your work by issuing the following command: `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT`.
       Do not combine it with any other command. <important>After this command, you cannot continue working on this task.</important>

    ## Command Execution Rules

    You are operating in an environment where

    1. You issue at least one command
    2. The system executes the command(s) in a subshell
    3. You see the result(s)
    4. You write your next command(s)

    Each response should include:

    1. **Reasoning text** where you explain your analysis and plan
    2. At least one tool call with your command

    **CRITICAL REQUIREMENTS:**

    - Your response SHOULD include reasoning text explaining what you're doing
    - Your response MUST include AT LEAST ONE bash tool call
    - You are running in Windows `cmd.exe`. DO NOT USE Linux commands like `ls`, `cat`, or `sed`.
    - Directory or environment variable changes are not persistent. Every action is executed in a new subshell.
    - Submit your changes and finish your work by issuing the following command: `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT`.
      Do not combine it with any other command.

    Example of a CORRECT response:
    <example_response>
    I need to understand the structure of the repository first. Let me check what files are in the current directory to get a better understanding of the codebase.

    [Makes bash tool call with {"command": "dir"} as arguments]
    </example_response>

    <system_information>
    {{system}} {{release}} {{version}} {{machine}}
    </system_information>

    ## Useful command examples for Windows

    ### List files:
    [Makes bash tool call with {"command": "dir"} as arguments]

    ### View file content:
    [Makes bash tool call with {"command": "type filename.py"} as arguments]

    ### IMPORTANT - How to edit files on Windows:
    NEVER use python -c to edit files. It always fails with quote escaping issues on Windows.
    Instead, create a helper Python script called fix.py, then run it with: python fix.py

    CRITICAL RULES FOR fix.py:
    1. NEVER put if and else on the same line. That is a SyntaxError in Python.
    2. Use \n in the replacement string to create new lines.
    3. INDENTATION IS CRITICAL: When replacing a line that has leading spaces, you MUST include those leading spaces in BOTH the search string and the replacement string.
    4. If the original line has 4 leading spaces, the if/else must also have 4 spaces, and the code INSIDE the if/else must have 8 spaces.

    Example: If the original code is '    old_line()' (4 leading spaces), the correct replacement is:
    '    if condition:\n        new_line_a()\n    else:\n        new_line_b()'
    Notice: 4 spaces before if, 8 spaces before inner lines, 4 spaces before else.

    Step 1 - Create fix.py using echo:
    [Makes bash tool call with {"command": "echo content = open('file.py', encoding='utf-8').read() > fix.py && echo content = content.replace('    old_line()', '    if x:\n        line_a()\n    else:\n        line_b()') >> fix.py && echo open('file.py', 'w', encoding='utf-8').write(content) >> fix.py"} as arguments]

    Step 2 - Run the helper script:
    [Makes bash tool call with {"command": "python fix.py"} as arguments]

    Step 3 - ALWAYS verify the result looks correct:
    [Makes bash tool call with {"command": "type file.py"} as arguments]

model:
  model_kwargs:
    drop_params: true
  format_error_template: |
    Tool call error:

    <error>
    {{error}}
    </error>

    REMEMBER: You MUST use the `bash` tool to execute your commands. Do not just output markdown text.
    You must always include at least one tool call.
    Call the bash tool with your command as the argument:
    - Tool: bash
    - Arguments: {"command": "your_command_here"}
